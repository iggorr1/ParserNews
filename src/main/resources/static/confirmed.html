<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirmed via Telegram — ParserNews</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        :root {
            --bg: #070b10;
            --surface: #0d131b;
            --surface-2: #121a24;
            --border: #243244;
            --text: #edf4f8;
            --muted: #91a0b4;
            --accent: #38d6c9;
            --accent-soft: rgba(56, 214, 201, 0.12);
            --success: #38d18a;
            --warning: #d8a73e;
            --danger: #f07272;
            --badge-bg: #172230;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at top left, rgba(56,214,201,0.08), transparent 30rem),
                        linear-gradient(180deg, #0a1018 0%, var(--bg) 20rem);
            color: var(--text);
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }
        header {
            background: rgba(8,13,20,0.88);
            border-bottom: 1px solid rgba(36,50,68,0.72);
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(18px);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header h1 { font-size: 20px; }
        header .subtitle { color: var(--muted); font-size: 13px; }
        .app-nav { margin-left: auto; display: flex; align-items: center; gap: 4px; }
        .app-nav a {
            color: var(--accent); text-decoration: none; font-size: 13px;
            padding: 5px 12px; border-radius: 6px;
            border: 1px solid transparent;
            transition: border-color .15s, background .15s;
        }
        .app-nav a:hover { border-color: var(--border); background: var(--accent-soft); }
        .app-nav a.logout { color: var(--muted); }
        .app-nav a.logout:hover { color: var(--danger); border-color: rgba(240,114,114,.3); background: rgba(240,114,114,.08); }
        main { padding: 24px 28px 48px; max-width: 1400px; }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .topbar h2 { font-size: 18px; }
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }
        button:hover { background: rgba(56,214,201,0.12); border-color: var(--accent); }
        button.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        .badge {
            display: inline-block;
            background: var(--badge-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 12px;
            color: var(--muted);
        }
        .breakdown { font-size: 13px; color: var(--muted); }
        .breakdown .ok  { color: var(--success); }
        .breakdown .warn { color: var(--warning); }
        .breakdown .bad { color: var(--danger); }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
            gap: 16px;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
            transition: border-color 0.18s, box-shadow 0.18s;
            user-select: none;
        }
        .card:hover { border-color: rgba(56,214,201,0.4); box-shadow: 0 0 0 1px rgba(56,214,201,0.08); }
        .card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(56,214,201,0.15); }
        .card.ignored { opacity: 0.55; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .card-title { font-weight: 700; font-size: 14px; line-height: 1.3; }
        .card-meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
        .card-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
        .status-badge {
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .status-badge.useful  { background: rgba(56,209,138,0.15); color: var(--success); border: 1px solid rgba(56,209,138,0.3); }
        .status-badge.pending { background: rgba(216,167,62,0.15);  color: var(--warning); border: 1px solid rgba(216,167,62,0.3); }
        .status-badge.ignored { background: rgba(240,114,114,0.15); color: var(--danger);  border: 1px solid rgba(240,114,114,0.3); }
        .price-badge { font-size: 13px; font-weight: 600; white-space: nowrap; }
        .mini-chart-wrap { position: relative; height: 90px; }
        .trigger-badge {
            display: inline-block;
            background: rgba(56,214,201,0.08);
            border: 1px solid rgba(56,214,201,0.2);
            border-radius: 5px;
            padding: 2px 8px;
            font-size: 11px;
            color: var(--accent);
        }
        .evidence-title { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .empty { color: var(--muted); padding: 40px 0; text-align: center; font-size: 15px; }
        .loading { color: var(--muted); padding: 40px 0; text-align: center; }

        /* ── Card action buttons ── */
        .card-actions { display: flex; gap: 8px; }
        .btn-confirm { background: rgba(56,209,138,0.1); border-color: rgba(56,209,138,0.3); color: var(--success); }
        .btn-confirm:hover { background: rgba(56,209,138,0.2); border-color: var(--success); }
        .btn-ignore  { background: rgba(240,114,114,0.1); border-color: rgba(240,114,114,0.3); color: var(--danger); }
        .btn-ignore:hover  { background: rgba(240,114,114,0.2); border-color: var(--danger); }

        /* ── Side panel ── */
        .panel-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(4,8,14,0.55);
            backdrop-filter: blur(3px);
            z-index: 100;
        }
        .panel-backdrop.open { display: block; }
        .side-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 640px;
            max-width: 100vw;
            background: #0b1320;
            border-left: 1px solid var(--border);
            z-index: 101;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
            box-shadow: -8px 0 40px rgba(0,0,0,0.5);
        }
        .side-panel.open { transform: translateX(0); }
        .panel-resize-handle {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: col-resize;
            background: transparent;
            transition: background 0.15s;
            z-index: 10;
        }
        .panel-resize-handle:hover { background: rgba(56,214,201,0.3); }
        .panel-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }
        .panel-title { font-size: 17px; font-weight: 700; line-height: 1.25; }
        .panel-subtitle { color: var(--muted); font-size: 12px; margin-top: 4px; }
        .panel-price-hero {
            margin-top: 10px;
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        .panel-price-now { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
        .panel-price-change { font-size: 15px; font-weight: 700; }
        .panel-price-label { font-size: 11px; color: var(--muted); }
        .panel-close {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            line-height: 1;
        }
        .panel-close:hover { border-color: var(--accent); color: var(--accent); background: none; }
        .panel-body {
            overflow-y: auto;
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Panel sections */
        .panel-section { display: flex; flex-direction: column; gap: 8px; }
        .panel-section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            font-weight: 600;
        }

        /* Price comparison block */
        .price-compare {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 8px;
            text-align: center;
        }
        .price-compare-arrow { color: var(--muted); font-size: 18px; }
        .price-compare-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
        .price-compare-value { font-size: 22px; font-weight: 700; }
        .price-compare-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .price-change-pill {
            display: inline-block;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 8px;
        }
        .price-change-pill.up   { background: rgba(56,209,138,0.15); color: var(--success); border: 1px solid rgba(56,209,138,0.3); }
        .price-change-pill.down { background: rgba(240,114,114,0.15); color: var(--danger);  border: 1px solid rgba(240,114,114,0.3); }
        .price-change-pill.flat { background: var(--badge-bg); color: var(--muted); border: 1px solid var(--border); }

        /* Detail chart */
        .detail-chart-wrap { position: relative; height: 260px; }
        .chart-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .chart-range-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.15s, color 0.15s;
        }
        .chart-range-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        .chart-range-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        .chart-reset-btn {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
        }
        .chart-reset-btn:hover { border-color: var(--accent); color: var(--accent); background: none; }
        .chart-hint { font-size: 11px; color: var(--muted); margin-left: auto; }

        /* AI block */
        .ai-block {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }
        .ai-verdict-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .ai-verdict-label { font-size: 14px; font-weight: 700; }
        .ai-conf { font-size: 12px; color: var(--muted); }
        .ai-reason-text { font-size: 13px; color: var(--muted); line-height: 1.55; }
        .ai-risks-text { font-size: 12px; color: var(--warning); margin-top: 8px; }
        .verdict-GOOD_SIGNAL    { color: var(--success); }
        .verdict-NEEDS_HUMAN_REVIEW { color: var(--warning); }
        .verdict-NOT_TRADABLE   { color: var(--muted); }
        .verdict-FALSE_POSITIVE { color: var(--danger); }

        /* Deal meta grid */
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .meta-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; }
        .meta-item-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
        .meta-item-value { font-size: 13px; font-weight: 600; }

        /* Evidence list */
        .evidence-item {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .evidence-source { font-size: 11px; color: var(--accent); }
        .evidence-ev-title { font-size: 13px; }
        .evidence-ev-link { font-size: 11px; color: var(--accent); word-break: break-all; }
        .evidence-ev-link a { color: var(--accent); }

        /* Panel actions */
        .panel-actions { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .panel-actions button { flex: 1; padding: 10px; font-size: 14px; }

        .spinner { color: var(--muted); text-align: center; padding: 30px; }

        @media (max-width: 560px) {
            .side-panel { width: 100vw; }
            .price-compare { grid-template-columns: 1fr; gap: 4px; }
            .price-compare-arrow { display: none; }
            .meta-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            header { flex-direction: column; align-items: flex-start; gap: 8px; padding: 14px 16px; }
            header a { margin-left: 0; }
            main { padding: 16px; }
            .topbar { flex-direction: column; align-items: flex-start; }
            .controls { flex-wrap: wrap; }
            .controls button { font-size: 12px; padding: 6px 10px; }
        }
    </style>
</head>
<body>
<header>
    <div>
        <h1>📋 Confirmed via Telegram</h1>
        <div class="subtitle">Click a deal to see price chart, AI analysis, and evidence</div>
    </div>
    <nav class="app-nav">
        <a href="/">Dashboard</a>
        <a href="/logs.html">Logs</a>
        <a href="/logout" class="logout">Logout</a>
    </nav>
</header>
<main>
    <div class="topbar">
        <div>
            <h2 id="pageTitle">Telegram Pipeline</h2>
            <div class="breakdown" id="breakdown" style="margin-top:5px;"></div>
        </div>
        <div class="controls">
            <button class="active" id="filterAll">All</button>
            <button id="filterUseful">✓ Confirmed</button>
            <button id="filterPending">⏳ Pending</button>
            <button id="filterIgnored">✗ Ignored</button>
            <button id="refreshBtn">⟳ Refresh</button>
        </div>
    </div>
    <div class="grid" id="grid">
        <div class="loading">Loading pipeline...</div>
    </div>
</main>

<!-- Side panel -->
<div class="panel-backdrop" id="panelBackdrop"></div>
<div class="side-panel" id="sidePanel" aria-hidden="true">
    <div class="panel-resize-handle" id="panelResizeHandle"></div>
    <div class="panel-header">
        <div style="min-width:0;flex:1;">
            <div class="panel-title" id="panelTitle">—</div>
            <div class="panel-subtitle" id="panelSubtitle"></div>
            <div class="panel-price-hero" id="panelPriceHero" style="display:none;"></div>
        </div>
        <button class="panel-close" id="panelClose" title="Close">✕</button>
    </div>
    <div class="panel-body" id="panelBody">
        <div class="spinner">Loading…</div>
    </div>
    <div class="panel-actions" id="panelActions" style="display:none;"></div>
</div>

<script>
'use strict';

let allGroups = [];
let currentFilter = 'ALL';
let isAdmin = false;
let selectedGroupKey = null;
const chartInstances = {};   // mini charts on cards
let panelChart = null;       // chart inside side panel
let panelHistoryPoints = []; // full 6mo daily data for range switching
let panelNewsDate = null;    // news date (YYYY-MM-DD) of open group
let panelNewsTs = null;      // news epoch seconds (for intraday marker)
let panelDirection = 'flat'; // 'up' | 'down' | 'flat'
let panelTicker = null;      // ticker of open group (for intraday re-fetch)
let activeRange = '6M';      // current range selection

// ── Filter buttons ────────────────────────────────────────────────────────────
document.getElementById('filterAll').addEventListener('click', () => setFilter('ALL'));
document.getElementById('filterUseful').addEventListener('click', () => setFilter('USEFUL'));
document.getElementById('filterPending').addEventListener('click', () => setFilter('PENDING'));
document.getElementById('filterIgnored').addEventListener('click', () => setFilter('IGNORED'));
document.getElementById('refreshBtn').addEventListener('click', loadData);
document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('panelBackdrop').addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ── Panel resize handle ───────────────────────────────────────────────────────
(function() {
    const handle = document.getElementById('panelResizeHandle');
    const panel  = document.getElementById('sidePanel');
    let dragging = false, startX = 0, startW = 0;
    handle.addEventListener('mousedown', e => {
        dragging = true; startX = e.clientX;
        startW = panel.getBoundingClientRect().width;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const delta = startX - e.clientX;
        const w = Math.max(340, Math.min(window.innerWidth - 60, startW + delta));
        panel.style.width = w + 'px';
    });
    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
})();

function setFilter(f) {
    currentFilter = f;
    ['filterAll','filterUseful','filterPending','filterIgnored'].forEach(id =>
        document.getElementById(id).classList.remove('active'));
    const map = { ALL:'filterAll', USEFUL:'filterUseful', PENDING:'filterPending', IGNORED:'filterIgnored' };
    document.getElementById(map[f]).classList.add('active');
    renderGrid();
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData() {
    document.getElementById('grid').innerHTML = '<div class="loading">Loading...</div>';
    try {
        const data = await fetchJson('/api/deal-groups/tg-dispatched?limit=100');
        allGroups = data || [];
        const useful  = allGroups.filter(g => g.reviewStatus === 'USEFUL').length;
        const pending = allGroups.filter(g => g.reviewStatus === 'PENDING').length;
        const ignored = allGroups.filter(g => g.reviewStatus === 'IGNORED').length;
        document.getElementById('breakdown').innerHTML =
            `<span class="ok">✓ ${useful} confirmed</span>  ·  ` +
            `<span class="warn">⏳ ${pending} pending</span>  ·  ` +
            `<span class="bad">✗ ${ignored} ignored</span>  ·  ` +
            `<span>${allGroups.length} total sent to Telegram</span>`;
        renderGrid();
        // Refresh open panel if visible
        if (selectedGroupKey) {
            const updated = allGroups.find(g => g.groupKey === selectedGroupKey);
            if (updated) openPanel(updated);
        }
    } catch (e) {
        document.getElementById('grid').innerHTML = `<div class="empty">Failed to load: ${esc(e.message)}</div>`;
    }
}

async function fetchJson(url) {
    const r = await fetch(url, { credentials: 'same-origin' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
}

// ── Render grid ───────────────────────────────────────────────────────────────
function renderGrid() {
    const grid = document.getElementById('grid');
    Object.values(chartInstances).forEach(c => c.destroy());
    Object.keys(chartInstances).forEach(k => delete chartInstances[k]);

    const filtered = currentFilter === 'ALL' ? allGroups
                   : allGroups.filter(g => g.reviewStatus === currentFilter);

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty">${currentFilter === 'ALL'
            ? 'No groups dispatched to Telegram yet.'
            : `No ${currentFilter.toLowerCase()} groups.`}</div>`;
        return;
    }

    grid.innerHTML = '';
    filtered.forEach(group => {
        const card = buildCard(group);
        card.addEventListener('click', () => openPanel(group));
        grid.appendChild(card);
    });

    filtered.forEach(group => {
        const ticker = validTicker(group.targetTicker);
        if (ticker) loadMiniChart(ticker, group.sortInstant, group.groupKey);
    });
}

function buildCard(group) {
    const card = document.createElement('div');
    const statusClass = (group.reviewStatus || 'PENDING').toLowerCase();
    const isSelected = group.groupKey === selectedGroupKey;
    card.className = `card ${statusClass === 'ignored' ? 'ignored' : ''} ${isSelected ? 'selected' : ''}`;
    card.id = `card-${group.groupKey}`;

    const ticker = validTicker(group.targetTicker);
    const newsDate = group.sortInstant ? group.sortInstant.substring(0, 10) : null;
    const statusLabel = { USEFUL: '✓ Confirmed', PENDING: '⏳ Pending', IGNORED: '✗ Ignored' }[group.reviewStatus] || '?';
    const sig = (group.relatedSignals || [])[0];

    card.innerHTML = `
        <div class="card-header">
            <div style="min-width:0;">
                <div class="card-title">${esc(group.targetCompany || group.title || ticker || 'Unknown')}</div>
                <div class="card-meta">
                    ${ticker ? `<strong>$${esc(ticker)}</strong> · ` : ''}${esc(group.dealRelevance || '')}
                    ${group.buyerCompany ? ` · ${esc(group.buyerCompany)}` : ''}
                    ${newsDate ? ` · ${newsDate}` : ''}
                </div>
            </div>
            <div class="card-badges">
                <span class="status-badge ${statusClass}">${statusLabel}</span>
                ${ticker ? `<span class="price-badge" id="cprice-${esc(group.groupKey)}">…</span>` : ''}
            </div>
        </div>
        ${sig ? `<div>
            <span class="trigger-badge">${esc(formatTriggerLabel(sig))}</span>
            <div class="evidence-title">${esc(truncate(sig.title, 90))}</div>
        </div>` : ''}
        ${ticker ? `<div class="mini-chart-wrap"><canvas id="mchart-${esc(group.groupKey)}"></canvas></div>` : ''}`;

    return card;
}

// ── Mini chart on card ────────────────────────────────────────────────────────
async function loadMiniChart(ticker, sortInstant, groupKey) {
    const newsDate = sortInstant ? sortInstant.substring(0, 10) : null;
    const [priceRes, histRes] = await Promise.allSettled([
        fetchJson(`/api/price/${encodeURIComponent(ticker)}`),
        fetchJson(`/api/price/${encodeURIComponent(ticker)}/history?range=3mo`)
    ]);

    const badge = document.getElementById(`cprice-${groupKey}`);
    if (priceRes.status === 'fulfilled' && priceRes.value) {
        const p = priceRes.value;
        const sign = p.changePct >= 0 ? '+' : '';
        if (badge) {
            badge.textContent = `$${p.price.toFixed(2)} (${sign}${p.changePct.toFixed(1)}%)`;
            badge.style.color = p.changePct >= 0 ? 'var(--success)' : 'var(--danger)';
        }
    } else if (badge) { badge.textContent = 'N/A'; }

    const canvas = document.getElementById(`mchart-${groupKey}`);
    if (!canvas) return;
    if (histRes.status !== 'fulfilled' || !(histRes.value?.points?.length)) {
        canvas.parentElement.innerHTML = '<div style="color:var(--muted);font-size:11px;padding-top:6px;">No chart data</div>';
        return;
    }
    const pts = histRes.value.points;
    const labels = pts.map(p => p.date);
    const closes = pts.map(p => p.close);
    const newsIdx = newsDate ? labels.findIndex(d => d >= newsDate) : -1;
    const id = `mchart-${groupKey}`;
    if (chartInstances[id]) chartInstances[id].destroy();
    chartInstances[id] = buildChart(canvas, labels, closes, newsIdx, 10);
}

// ── Side panel ────────────────────────────────────────────────────────────────
async function openPanel(group) {
    selectedGroupKey = group.groupKey;
    // Highlight selected card
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    const sel = document.getElementById(`card-${group.groupKey}`);
    if (sel) sel.classList.add('selected');

    const ticker = validTicker(group.targetTicker);
    const newsDate = group.sortInstant ? group.sortInstant.substring(0, 10) : null;
    const statusClass = (group.reviewStatus || 'PENDING').toLowerCase();
    const statusLabel = { USEFUL: '✓ Confirmed', PENDING: '⏳ Pending', IGNORED: '✗ Ignored' }[group.reviewStatus] || '?';

    document.getElementById('panelTitle').textContent =
        group.targetCompany || group.title || ticker || 'Unknown';
    document.getElementById('panelSubtitle').innerHTML =
        `${ticker ? `<strong style="color:var(--accent)">$${esc(ticker)}</strong> · ` : ''}` +
        `<span class="status-badge ${statusClass}" style="vertical-align:middle;">${statusLabel}</span>` +
        `${newsDate ? ` · ${newsDate}` : ''}`;
    const priceHero = document.getElementById('panelPriceHero');
    priceHero.style.display = 'none';
    priceHero.innerHTML = '';

    // Show panel
    document.getElementById('panelBody').innerHTML = '<div class="spinner">Loading data…</div>';
    document.getElementById('panelActions').style.display = 'none';
    document.getElementById('sidePanel').classList.add('open');
    document.getElementById('panelBackdrop').classList.add('open');
    document.getElementById('sidePanel').setAttribute('aria-hidden', 'false');

    if (panelChart) { panelChart.destroy(); panelChart = null; }

    // Fetch price + history + AI in parallel
    const [priceRes, histRes, aiRes] = await Promise.allSettled([
        ticker ? fetchJson(`/api/price/${encodeURIComponent(ticker)}`) : Promise.resolve(null),
        ticker ? fetchJson(`/api/price/${encodeURIComponent(ticker)}/history?range=6mo`) : Promise.resolve(null),
        fetchJson(`/api/deal-groups/${encodeURIComponent(group.groupKey)}/ai-review/latest`)
    ]);

    const price  = priceRes.status  === 'fulfilled' ? priceRes.value  : null;
    const hist   = histRes.status   === 'fulfilled' ? histRes.value   : null;
    const ai     = aiRes.status     === 'fulfilled' ? aiRes.value     : null;

    // Compute before-news price from history
    let priceBeforeNews = null;
    let priceBeforeDate = null;
    if (hist?.points?.length && newsDate) {
        const pts = hist.points;
        const newsIdx = pts.findIndex(p => p.date >= newsDate);
        if (newsIdx > 0) {
            priceBeforeNews = pts[newsIdx - 1].close;
            priceBeforeDate = pts[newsIdx - 1].date;
        } else if (newsIdx === 0) {
            priceBeforeNews = pts[0].close;
            priceBeforeDate = pts[0].date;
        }
    }

    const body = document.getElementById('panelBody');
    body.innerHTML = '';

    // ── Price comparison ──────────────────────────────────────────────────────
    const nowPrice = price?.price ?? null;
    const changeSinceNews = (nowPrice && priceBeforeNews)
        ? ((nowPrice - priceBeforeNews) / priceBeforeNews * 100) : null;
    const direction = changeSinceNews == null ? 'flat' : changeSinceNews > 0.5 ? 'up' : changeSinceNews < -0.5 ? 'down' : 'flat';
    const dirColor  = direction === 'up' ? 'var(--success)' : direction === 'down' ? 'var(--danger)' : 'var(--muted)';
    const pillSign  = changeSinceNews != null && changeSinceNews >= 0 ? '+' : '';

    if (ticker && nowPrice) {
        const dayChange = price?.changePct ?? null;
        const daySign   = dayChange != null && dayChange >= 0 ? '+' : '';
        priceHero.style.display = 'flex';
        priceHero.innerHTML = `
            <span class="panel-price-now" style="color:${dirColor};">$${nowPrice.toFixed(2)}</span>
            ${dayChange != null ? `<span class="panel-price-change" style="color:${dayChange >= 0 ? 'var(--success)' : 'var(--danger)'};">${daySign}${dayChange.toFixed(2)}% today</span>` : ''}
            ${changeSinceNews != null ? `<span class="panel-price-label">${pillSign}${changeSinceNews.toFixed(1)}% since news</span>` : ''}`;
    }

    if (ticker && (nowPrice || priceBeforeNews)) {
        body.appendChild(el('div', 'panel-section', `
            <div class="panel-section-label">Price movement</div>
            <div class="price-compare">
                <div>
                    <div class="price-compare-label">Before news</div>
                    <div class="price-compare-value" style="color:var(--muted);">
                        ${priceBeforeNews ? `$${priceBeforeNews.toFixed(2)}` : '—'}
                    </div>
                    <div class="price-compare-date">${priceBeforeDate || '—'}</div>
                </div>
                <div class="price-compare-arrow">→</div>
                <div>
                    <div class="price-compare-label">Now</div>
                    <div class="price-compare-value" style="color:${dirColor};">
                        ${nowPrice ? `$${nowPrice.toFixed(2)}` : '—'}
                    </div>
                    <div class="price-compare-date">today</div>
                </div>
            </div>
            ${changeSinceNews != null ? `<div style="text-align:center;">
                <span class="price-change-pill ${direction}">${pillSign}${changeSinceNews.toFixed(1)}% since news</span>
            </div>` : ''}
        `));
    }

    // ── Detail chart ──────────────────────────────────────────────────────────
    if (hist?.points?.length || ticker) {
        panelHistoryPoints = hist?.points || [];
        panelNewsDate = newsDate;
        panelNewsTs = group.sortInstant ? Math.floor(new Date(group.sortInstant).getTime() / 1000) : null;
        panelDirection = direction;
        panelTicker = ticker;
        activeRange = '6M';

        const section = document.createElement('div');
        section.className = 'panel-section';

        const RANGES = ['10M','1H','1D','1W','1M','3M','6M'];
        const toolbar = document.createElement('div');
        toolbar.className = 'chart-toolbar';
        toolbar.innerHTML = `
            <span class="panel-section-label" style="margin:0;">Chart</span>
            ${RANGES.map(r =>
                `<button class="chart-range-btn${r==='6M'?' active':''}" data-range="${r}">${r}</button>`
            ).join('')}
            <button class="chart-reset-btn" id="chartResetZoom">Reset zoom</button>`;
        section.appendChild(toolbar);

        const hint = document.createElement('div');
        hint.style.cssText = 'font-size:11px;color:var(--muted);text-align:right;margin-top:2px;';
        hint.textContent = 'Scroll to zoom · Drag to pan';
        section.appendChild(hint);

        const wrap = document.createElement('div');
        wrap.className = 'detail-chart-wrap';
        wrap.id = 'panelChartWrap';
        const canvas = document.createElement('canvas');
        canvas.id = 'panelChartCanvas';
        wrap.appendChild(canvas);
        section.appendChild(wrap);
        body.appendChild(section);

        await renderPanelChart(canvas, '6M');

        toolbar.querySelectorAll('.chart-range-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                toolbar.querySelectorAll('.chart-range-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeRange = btn.dataset.range;
                const c = document.getElementById('panelChartCanvas');
                if (c) await renderPanelChart(c, activeRange);
            });
        });

        document.getElementById('chartResetZoom')?.addEventListener('click', () => {
            if (panelChart) panelChart.resetZoom();
        });
    }

    // ── AI analysis ──────────────────────────────────────────────────────────
    if (ai?.verdict) {
        const verdictClass = `verdict-${ai.verdict}`;
        body.appendChild(el('div', 'panel-section', `
            <div class="panel-section-label">AI analysis</div>
            <div class="ai-block">
                <div class="ai-verdict-row">
                    <span class="ai-verdict-label ${verdictClass}">🤖 ${esc(ai.verdict)}</span>
                    ${ai.confidence ? `<span class="ai-conf">${esc(ai.confidence)} confidence</span>` : ''}
                </div>
                ${ai.reason ? `<div class="ai-reason-text">${esc(ai.reason)}</div>` : ''}
                ${ai.riskFlags?.length ? `<div class="ai-risks-text">⚠️ ${esc(ai.riskFlags.join(', '))}</div>` : ''}
            </div>
        `));
    }

    // ── Deal details ──────────────────────────────────────────────────────────
    body.appendChild(el('div', 'panel-section', `
        <div class="panel-section-label">Deal details</div>
        <div class="meta-grid">
            ${metaItem('Target', group.targetCompany || '—')}
            ${metaItem('Ticker', ticker ? `$${ticker}` : '—')}
            ${metaItem('Buyer', group.buyerCompany || '—')}
            ${metaItem('Buyer ticker', validTicker(group.buyerTicker) ? `$${group.buyerTicker}` : '—')}
            ${metaItem('Relevance', group.dealRelevance || '—')}
            ${metaItem('Tradability', group.tradability || '—')}
            ${metaItem('Timing', group.dealTiming || '—')}
            ${metaItem('Priority', group.priority || '—')}
        </div>
    `));

    // ── Evidence ──────────────────────────────────────────────────────────────
    const signals = group.relatedSignals || [];
    if (signals.length) {
        const sec = el('div', 'panel-section', '<div class="panel-section-label">Evidence signals</div>');
        signals.forEach(sig => {
            const item = document.createElement('div');
            item.className = 'evidence-item';
            item.innerHTML = `
                <div class="evidence-source">${esc(formatTriggerLabel(sig))}</div>
                <div class="evidence-ev-title">${esc(sig.title || '')}</div>
                ${sig.url ? `<div class="evidence-ev-link"><a href="${esc(sig.url)}" target="_blank" rel="noopener">${esc(truncate(sig.url, 65))}</a></div>` : ''}`;
            sec.appendChild(item);
        });
        body.appendChild(sec);
    }

    // ── Admin action buttons ──────────────────────────────────────────────────
    if (isAdmin && group.reviewStatus === 'PENDING') {
        const actions = document.getElementById('panelActions');
        actions.innerHTML = `
            <button class="btn-confirm" id="panelConfirm">✓ Confirm</button>
            <button class="btn-ignore"  id="panelIgnore">✗ Ignore</button>`;
        actions.style.display = 'flex';
        document.getElementById('panelConfirm').onclick = () => setReviewStatus(group.groupKey, 'USEFUL');
        document.getElementById('panelIgnore').onclick  = () => setReviewStatus(group.groupKey, 'IGNORED');
    }
}

function closePanel() {
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('panelBackdrop').classList.remove('open');
    document.getElementById('sidePanel').setAttribute('aria-hidden', 'true');
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    selectedGroupKey = null;
    if (panelChart) { panelChart.destroy(); panelChart = null; }
}

// ── Panel chart: fetch intraday or filter daily, then draw ───────────────────
const INTRADAY_RANGES = { '10M': { interval: '1m', minutes: 10 }, '1H': { interval: '5m', minutes: 60 }, '1D': { interval: '5m', minutes: 390 } };

async function renderPanelChart(canvasOrIgnored, range) {
    if (panelChart) { panelChart.destroy(); panelChart = null; }

    let pts;
    const intradayCfg = INTRADAY_RANGES[range];

    // Always work via the stable wrap ID — avoids stale canvas references
    function getWrap() { return document.getElementById('panelChartWrap'); }
    function freshCanvas() {
        const w = getWrap();
        if (!w) return null;
        w.innerHTML = '';
        const c = document.createElement('canvas');
        c.id = 'panelChartCanvas';
        w.appendChild(c);
        return c;
    }
    function showMsg(msg) {
        const w = getWrap();
        if (w) w.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:16px;text-align:center;display:flex;align-items:center;justify-content:center;height:100%;">${msg}</div>`;
    }

    if (intradayCfg && panelTicker) {
        showMsg('Loading…');
        try {
            const hist = await fetchJson(`/api/price/${encodeURIComponent(panelTicker)}/history?range=1d&interval=${intradayCfg.interval}`);
            pts = hist?.points || [];
            if (pts.length && intradayCfg.minutes < 390) {
                const nowSec = Date.now() / 1000;
                const cutSec = nowSec - intradayCfg.minutes * 60;
                pts = pts.filter(p => p.ts >= cutSec);
            }
        } catch { pts = []; }
    } else {
        pts = filterByDays(panelHistoryPoints, range);
    }

    if (!pts.length) { showMsg('No data for this range — market may be closed'); return; }

    const canvas = freshCanvas();
    if (!canvas) return;

    const labels = pts.map(p => p.label || p.date);
    const closes = pts.map(p => p.close);

    // News marker: closest point at or after news time
    let newsIdx = -1;
    if (intradayCfg && panelNewsTs) {
        newsIdx = pts.findIndex(p => p.ts >= panelNewsTs);
    } else if (panelNewsDate) {
        newsIdx = pts.findIndex(p => (p.label || p.date) >= panelNewsDate);
    }

    panelChart = buildChart(canvas, labels, closes, newsIdx, 11, true, panelDirection);
}

function filterByDays(pts, range) {
    if (!pts.length) return pts;
    const days = { '1W': 7, '2W': 14, '1M': 30, '3M': 90, '6M': 180 }[range] ?? 180;
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);
    const cutStr = cutoff.toISOString().substring(0, 10);
    return pts.filter(p => (p.label || p.date) >= cutStr);
}

// ── Chart builder ─────────────────────────────────────────────────────────────
function buildChart(canvas, labels, closes, newsIdx, tickFontSize, enableZoom = false, direction = 'flat') {
    const zoomPlugin = enableZoom ? {
        zoom: {
            pan: { enabled: true, mode: 'x', threshold: 5 },
            zoom: {
                wheel: { enabled: true, speed: 0.08 },
                pinch: { enabled: true },
                mode: 'x'
            }
        }
    } : {};

    // Binance-style: green if up, red if down, teal for mini cards (flat/unknown)
    const lineColor = direction === 'up'   ? '#26c96f'
                    : direction === 'down' ? '#ef5350'
                    : '#38d6c9';

    const gradientTop    = direction === 'up'   ? 'rgba(38,201,111,0.38)'
                         : direction === 'down' ? 'rgba(239,83,80,0.38)'
                         : 'rgba(56,214,201,0.18)';
    const gradientMid    = direction === 'up'   ? 'rgba(38,201,111,0.08)'
                         : direction === 'down' ? 'rgba(239,83,80,0.08)'
                         : 'rgba(56,214,201,0.04)';

    function makeGradient(ctx, chartArea) {
        const g = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
        g.addColorStop(0,   gradientTop);
        g.addColorStop(0.55, gradientMid);
        g.addColorStop(1,   'rgba(0,0,0,0)');
        return g;
    }

    const chart = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels,
            datasets: [{
                data: closes,
                borderColor: lineColor,
                borderWidth: enableZoom ? 2 : 1.5,
                pointRadius: 0,
                fill: true,
                backgroundColor: function(context) {
                    const { chart: c } = context;
                    if (!c.chartArea) return 'transparent';
                    return makeGradient(c.ctx, c.chartArea);
                },
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                    backgroundColor: 'rgba(13,19,27,0.95)',
                    borderColor: 'rgba(36,50,68,0.8)',
                    borderWidth: 1,
                    titleColor: '#91a0b4',
                    bodyColor: '#edf4f8',
                    padding: 8,
                    callbacks: {
                        title: ctx => ctx[0]?.label ?? '',
                        label: ctx => `$${ctx.parsed.y.toFixed(2)}`
                    }
                },
                ...zoomPlugin
            },
            scales: {
                x: {
                    ticks: { maxTicksLimit: 6, color: 'var(--muted)', font: { size: tickFontSize } },
                    grid: { color: 'rgba(36,50,68,0.5)' }
                },
                y: {
                    ticks: { color: 'var(--muted)', font: { size: tickFontSize }, callback: v => `$${v.toFixed(0)}` },
                    grid: { color: 'rgba(36,50,68,0.5)' }
                }
            }
        }
    });

    // Crosshair — vertical line following the active tooltip point
    Chart.register({
        id: `crosshair-${canvas.id || Math.random()}`,
        afterDraw(c) {
            if (c !== chart) return;
            const active = c.tooltip._active;
            if (!active || !active.length) return;
            const { ctx, chartArea } = c;
            const x = active[0].element.x;
            ctx.save();
            ctx.strokeStyle = 'rgba(237,244,248,0.18)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.stroke();
            ctx.restore();
        }
    });

    if (newsIdx >= 0) {
        Chart.register({
            id: `news-line-${canvas.id || Math.random()}`,
            afterDraw(c) {
                if (c !== chart) return;
                const { ctx, chartArea, scales } = c;
                const x = scales.x.getPixelForValue(newsIdx);
                if (x < chartArea.left || x > chartArea.right) return;
                ctx.save();

                // Vertical dashed line
                ctx.strokeStyle = 'rgba(216,167,62,0.9)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(x, chartArea.top); ctx.lineTo(x, chartArea.bottom); ctx.stroke();
                ctx.setLineDash([]);

                // Dot at the news price
                const priceY = scales.y.getPixelForValue(closes[newsIdx]);
                ctx.fillStyle = '#d8a73e';
                ctx.beginPath(); ctx.arc(x, priceY, 5, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#070b10'; ctx.lineWidth = 1.5; ctx.stroke();

                // "news" label — flip left if near right edge
                ctx.fillStyle = '#d8a73e';
                ctx.font = `bold ${tickFontSize}px Inter, sans-serif`;
                const labelX = x + 6 + 34 < chartArea.right ? x + 6 : x - 38;
                ctx.fillText('news', labelX, chartArea.top + 14);

                ctx.restore();
            }
        });
        chart.update();
    }
    return chart;
}

// ── Review actions ────────────────────────────────────────────────────────────
async function setReviewStatus(groupKey, status) {
    try {
        const r = await fetch(`/api/deal-groups/${encodeURIComponent(groupKey)}/manual-review`, {
            method: 'PATCH',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        await loadData();
    } catch (e) {
        alert('Failed to update: ' + e.message);
    }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function el(tag, cls, html) {
    const d = document.createElement(tag);
    d.className = cls;
    d.innerHTML = html;
    return d;
}
function metaItem(label, value) {
    return `<div class="meta-item"><div class="meta-item-label">${esc(label)}</div><div class="meta-item-value">${esc(value)}</div></div>`;
}
function formatTriggerLabel(sig) {
    return [sig.sourceType, sig.signalType].filter(Boolean).map(s => s.replace(/_/g,' ')).join(' · ');
}
function validTicker(t) { return t && t !== 'UNKNOWN' && t.trim() !== '' ? t : null; }
function truncate(s, n) { if (!s) return ''; return s.length > n ? s.substring(0, n-1) + '…' : s; }
function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
fetch('/api/me', { credentials: 'same-origin' })
    .then(r => r.json())
    .then(me => { isAdmin = me.admin; })
    .catch(() => {})
    .finally(() => loadData());
</script>
