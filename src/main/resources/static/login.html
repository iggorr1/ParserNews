<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — ParserNews</title>
    <style>
        :root {
            --bg: #070b10; --surface: #0d131b; --surface-2: #121a24;
            --border: #243244; --text: #edf4f8; --muted: #91a0b4;
            --accent: #38d6c9; --danger: #f07272;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background:
                radial-gradient(circle at top left, rgba(56,214,201,0.08), transparent 30rem),
                linear-gradient(180deg, #0a1018 0%, var(--bg) 20rem);
            color: var(--text);
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 36px;
            width: 360px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        }
        .logo { font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -.01em; }
        .sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: .03em; text-transform: uppercase; }
        input[type=text], input[type=password] {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 7px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            margin-bottom: 20px;
            transition: border-color .15s;
        }
        input:focus { border-color: var(--accent); }
        button[type=submit] {
            width: 100%;
            background: var(--accent);
            color: #050c12;
            padding: 11px;
            border: none;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: .01em;
            transition: filter .15s;
        }
        button[type=submit]:hover { filter: brightness(1.1); }
        .alert {
            background: rgba(240,114,114,0.1);
            border: 1px solid rgba(240,114,114,0.4);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 7px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .ok {
            background: rgba(56,209,138,0.1);
            border: 1px solid rgba(56,209,138,0.4);
            color: #38d18a;
            padding: 10px 14px;
            border-radius: 7px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">ParserNews</div>
    <div class="sub">M&amp;A research monitoring — sign in to continue</div>
    <div id="err" class="alert">Invalid username or password.</div>
    <div id="out" class="ok">You have been signed out.</div>
    <form method="post" action="/login">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
        <button type="submit">Sign in →</button>
    </form>
</div>
<script>
    const p = new URLSearchParams(location.search);
    if (p.has('error'))  document.getElementById('err').style.display = '';
    if (p.has('logout')) document.getElementById('out').style.display = '';
</script>
</body>
</html>
