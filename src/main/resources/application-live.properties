scanner.source=rss
scanner.console-min-status=WATCHLIST
scanner.safety.real-web-parsing-enabled=true
scanner.analyzer.watchlist-threshold-override=1
scanner.monitoring.enabled=true
# Fast incremental poll: detect new items and immediately trigger dispatch.
# fixedDelay (not fixedRate) means the next run starts 30s AFTER the previous finishes,
# so scans never overlap even if one runs long. Feed-health monitor surfaces any rate-limit bans.
scanner.monitoring.initial-delay-ms=20000
scanner.monitoring.poll-delay-ms=30000
scanner.rss.fetch-full-article-text=true
