services:
  parsernews:
    build:
      context: .
    container_name: parsernews
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=live
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/parsernews-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
      - alerts.telegram.enabled=false
      - alerts.dispatch.enabled=false
    volumes:
      - ./data:/app/data
      - ./output:/app/output
