services:
  postgres:
    image: postgres:16-alpine
    container_name: parsernews-postgres
    environment:
      POSTGRES_DB: parsernews
      POSTGRES_USER: parsernews
      POSTGRES_PASSWORD: parsernews
    ports:
      - "5432:5432"
    volumes:
      - parsernews-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parsernews -d parsernews"]
      interval: 10s
      timeout: 5s
      retries: 10

  parsernews:
    build:
      context: .
    container_name: parsernews
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: live,postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/parsernews
      SPRING_DATASOURCE_USERNAME: parsernews
      SPRING_DATASOURCE_PASSWORD: parsernews
      PARSERNEWS_TELEGRAM_ENABLED: "false"
      PARSERNEWS_TELEGRAM_BOT_TOKEN: ""
      PARSERNEWS_TELEGRAM_CHAT_ID: ""
      ALERTS_DISPATCH_ENABLED: "false"
      FULL_REFRESH_SCHEDULER_ENABLED: ${FULL_REFRESH_SCHEDULER_ENABLED:-false}
      FULL_REFRESH_SCHEDULER_INITIAL_DELAY_MS: ${FULL_REFRESH_SCHEDULER_INITIAL_DELAY_MS:-120000}
      FULL_REFRESH_SCHEDULER_FIXED_DELAY_MS: ${FULL_REFRESH_SCHEDULER_FIXED_DELAY_MS:-900000}
      OPENAI_ANALYSIS_ENABLED: ${OPENAI_ANALYSIS_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_ANALYSIS_MAX_INPUT_CHARS: ${OPENAI_ANALYSIS_MAX_INPUT_CHARS:-12000}
      PARSERNEWS_AUTH_ENABLED: "true"
      PARSERNEWS_AUTH_USERNAME: admin
      PARSERNEWS_AUTH_PASSWORD: change-me
      SEC_SCANNER_ENABLED: ${SEC_SCANNER_ENABLED:-false}
      SEC_SCANNER_WATCHLIST: ${SEC_SCANNER_WATCHLIST:-}
      SEC_SCANNER_MAX_FILINGS_PER_CIK: ${SEC_SCANNER_MAX_FILINGS_PER_CIK:-20}
    volumes:
      - ./output:/app/output

volumes:
  parsernews-postgres-data:
