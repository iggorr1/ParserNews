services:
  postgres:
    image: postgres:16-alpine
    container_name: parsernews-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parsernews}
      POSTGRES_USER: ${POSTGRES_USER:-parsernews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parsernews}
    ports:
      - "5432:5432"
    volumes:
      - parsernews-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parsernews} -d ${POSTGRES_DB:-parsernews}"]
      interval: 10s
      timeout: 5s
      retries: 10

  parsernews:
    build:
      context: .
    container_name: parsernews
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: live,postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-parsernews}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-parsernews}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-parsernews}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ALERTS_DISPATCH_ENABLED: ${ALERTS_DISPATCH_ENABLED:-false}
      FULL_REFRESH_SCHEDULER_ENABLED: ${FULL_REFRESH_SCHEDULER_ENABLED:-false}
      FULL_REFRESH_SCHEDULER_INITIAL_DELAY_MS: ${FULL_REFRESH_SCHEDULER_INITIAL_DELAY_MS:-120000}
      FULL_REFRESH_SCHEDULER_FIXED_DELAY_MS: ${FULL_REFRESH_SCHEDULER_FIXED_DELAY_MS:-900000}
      AUTO_DISPATCH_INITIAL_DELAY_MS: ${AUTO_DISPATCH_INITIAL_DELAY_MS:-120000}
      AUTO_DISPATCH_FIXED_DELAY_MS: ${AUTO_DISPATCH_FIXED_DELAY_MS:-600000}
      AUTO_DISPATCH_MAX_AI_PER_RUN: ${AUTO_DISPATCH_MAX_AI_PER_RUN:-5}
      OPENAI_ANALYSIS_ENABLED: ${OPENAI_ANALYSIS_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_ANALYSIS_MAX_INPUT_CHARS: ${OPENAI_ANALYSIS_MAX_INPUT_CHARS:-12000}
      PARSERNEWS_AUTH_ENABLED: ${PARSERNEWS_AUTH_ENABLED:-true}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-change-me}
      APP_VIEWER_USERNAME: ${APP_VIEWER_USERNAME:-}
      APP_VIEWER_PASSWORD: ${APP_VIEWER_PASSWORD:-}
      SEC_SCANNER_ENABLED: ${SEC_SCANNER_ENABLED:-false}
      SEC_SCANNER_WATCHLIST: ${SEC_SCANNER_WATCHLIST:-}
      SEC_SCANNER_MAX_FILINGS_PER_CIK: ${SEC_SCANNER_MAX_FILINGS_PER_CIK:-20}
      SEC_DISCOVERY_ENABLED: ${SEC_DISCOVERY_ENABLED:-false}
      SEC_DISCOVERY_MAX_FILINGS_PER_RUN: ${SEC_DISCOVERY_MAX_FILINGS_PER_RUN:-100}
      SEC_DISCOVERY_FORMS: ${SEC_DISCOVERY_FORMS:-8-K,SC TO-T,SC TO-T/A,SC TO-I,SC TO-I/A,SC TO-C,SC 14D9,SC 13E3,SC 13E3/A,DEFM14A,PREM14A,425,S-4}
      SEC_DISCOVERY_FETCH_PRIMARY_DOCUMENT: ${SEC_DISCOVERY_FETCH_PRIMARY_DOCUMENT:-false}
      SEC_DISCOVERY_REQUEST_DELAY_MS: ${SEC_DISCOVERY_REQUEST_DELAY_MS:-200}
      SEC_DISCOVERY_SCHEDULER_ENABLED: ${SEC_DISCOVERY_SCHEDULER_ENABLED:-false}
      SEC_DISCOVERY_SCHEDULER_INITIAL_DELAY_MS: ${SEC_DISCOVERY_SCHEDULER_INITIAL_DELAY_MS:-60000}
      SEC_DISCOVERY_SCHEDULER_FIXED_DELAY_MS: ${SEC_DISCOVERY_SCHEDULER_FIXED_DELAY_MS:-300000}
    volumes:
      - ./output:/app/output

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    depends_on:
      - parsernews
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_TUNNEL_CREDENTIALS}:/etc/cloudflared/creds.json:ro

volumes:
  parsernews-postgres-data:
